ue_energy_analytics:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', '../../engines/duckdb/data/ue_energy.duckdb') }}"
      threads: 4
      schema: main
      extensions:
        - parquet

    prod:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'root') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'root') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'ue_energy') }}"
      schema: "{{ env_var('POSTGRES_SCHEMA', 'analytics') }}"
      threads: 4